<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MandaCafe Menü</title>

<style>
body{margin:0;font-family:Arial;background:#fff7ef}

/* HEADER */
header{
background:white;
padding:15px;
position:sticky;
top:0;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{text-align:center;margin:0;color:#6a3418}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ddd;
border-radius:10px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:10px;
padding:10px;
}

.card{
background:white;
padding:10px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.emoji{font-size:30px}

.price{color:#7a3f1d;font-weight:bold}

/* ADMIN */
.admin{
margin:10px;
padding:15px;
background:#fff;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.hidden{display:none}

button{
padding:8px;
margin-top:5px;
border:none;
border-radius:10px;
cursor:pointer;
}

.add{background:#7a3f1d;color:white}
.del{background:red;color:white}
.edit{background:orange;color:white}

</style>
</head>

<body>

<header>
<h1>🐃 MandaCafe Menü</h1>

<input id="search" placeholder="Ürün ara...">

<select id="filter">
<option value="all">Tümü</option>
<option>Sıcak İçecekler</option>
<option>Soğuk İçecekler</option>
<option>Tatlılar</option>
<option>Ana Yemekler</option>
</select>

<button onclick="login()">Admin Giriş</button>
</header>

<!-- ADMIN PANEL -->
<div class="admin hidden" id="adminPanel">

<h3>Admin Panel</h3>

<input id="name" placeholder="Ürün adı">
<input id="price" placeholder="Fiyat">
<input id="cat" placeholder="Kategori">

<button class="add" onclick="addProduct()">Ekle</button>

</div>

<!-- MENU -->
<div class="grid" id="menu"></div>

<script>
let data=[
{name:"Türk Kahvesi",price:70,cat:"Sıcak İçecekler",emoji:"☕"},
{name:"Limonata",price:80,cat:"Soğuk İçecekler",emoji:"🍋"},
{name:"Sufle",price:150,cat:"Tatlılar",emoji:"🍰"},
{name:"Hamburger",price:220,cat:"Ana Yemekler",emoji:"🍔"}
];

function render(){
let q=document.getElementById("search").value.toLowerCase();
let f=document.getElementById("filter").value;

document.getElementById("menu").innerHTML=
data.filter(x=>
(x.cat==f||f=="all") &&
x.name.toLowerCase().includes(q)
).map((x,i)=>`
<div class="card">
<div class="emoji">${x.emoji}</div>
<b>${x.name}</b>
<p class="price">${x.price}₺</p>

<button class="del" onclick="del(${i})">Sil</button>
</div>
`).join("");
}

function addProduct(){
let n=document.getElementById("name").value;
let p=document.getElementById("price").value;
let c=document.getElementById("cat").value;

data.push({name:n,price:p,cat:c,emoji:"🍽️"});
save();
render();
}

function del(i){
data.splice(i,1);
save();
render();
}

function save(){
localStorage.setItem("menu",JSON.stringify(data));
}

function load(){
let d=localStorage.getItem("menu");
if(d) data=JSON.parse(d);
}

function login(){
let pass=prompt("Şifre:");
if(pass=="1234"){
document.getElementById("adminPanel").classList.remove("hidden");
}
}

document.getElementById("search").oninput=render;
document.getElementById("filter").onchange=render;

load();
render();
</script>

</body>
</html>
