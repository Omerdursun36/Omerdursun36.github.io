<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MandaCafe</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#fff3e6,#f0d6b8);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
text-align:center;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
width:90%;
max-width:500px;
}

.logo{font-size:70px;}
h1{color:#7a3f1d;}

.btn{
display:block;
margin-top:15px;
padding:12px;
border-radius:12px;
text-decoration:none;
font-weight:bold;
}

.primary{background:#7a3f1d;color:white;}
.secondary{border:2px solid #7a3f1d;color:#7a3f1d;}

#qrcode{margin-top:20px;}
</style>
</head>

<body>

<div class="box">
<div class="logo">🐃</div>
<h1>MandaCafe</h1>

<a class="btn primary" href="menu.html">Menüye Git</a>

<div id="qrcode"></div>

<p>QR ile menüye giriş</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const MENU_URL="https://omerdursun36.github.io/MandaCafe/menu.html";

new QRCode(document.getElementById("qrcode"),{
text:MENU_URL,
width:180,
height:180
});
</script>

</body>
</html>
